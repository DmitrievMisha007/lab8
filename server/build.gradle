plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

dependencies {
    implementation project(':common')
    implementation 'org.postgresql:postgresql:42.6.0'
}

application {
    mainClass = 'Main'
}

// Настройка shadowJar для одного fat JAR
shadowJar {
    archiveFileName = 'server.jar'

    mergeServiceFiles()
}