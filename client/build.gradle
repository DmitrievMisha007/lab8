plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
}

javafx {
    version = '21.0.2'
    modules = [ 'javafx.controls', 'javafx.graphics', ]
}

application {
    mainClass = 'client.gui.JavaFXMain'
}
dependencies {
    implementation project(':common')
}